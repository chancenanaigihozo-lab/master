<title>Fantastic Hotel</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* Header */
    header {
        background: linear-gradient(to right, #052db2, #1717e5);
        color: rgb(225, 216, 216);
        padding: 15px;
    }

    header h1 {
        margin: 0;
        font-size: 20px;
    }

    header span {
        color: gold;
    }

    /* Navigation */
    nav {
        margin-top: 10px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin: 10px;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    /* Gallery Title */
    .title {
        text-align: center;
        background: #ccc;
        padding: 30px;
        font-size: 35px;
        color: #4b00ff;
        font-weight: bold;
    }

    /* Gallery Grid */
    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        padding: 10px;
        background: black;
    }

    .gallery img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    /* Footer Text */
    .footer {
        color: white;
        padding: 5px;
        font-size: 14px;
    }
</style>
</head>
